# Taxonomy 配置（保留默认 category/tag，新增 use-case 和 similar 用于新内容类型）
# 注1：taxonomies 的 plural 不能与 section 目录同名，否则 Hugo 路由优先匹配 taxonomy term list
# 导致 section 列表页（如 /use-cases/、/similar/）显示"暂无收录内容"。
# 注2：Hugo frontmatter 中的字段名必须使用 plural 形式（即此处的右侧值）。
# - use-case：plural 设为 "use-case"（singular=plural），与 section "use-cases" 不冲突
#   frontmatter 字段名 = use-case（与 plural 一致）✓
# - similar：plural 设为 "similar-tax"（避免与 section "similar" 冲突）
#   frontmatter 字段名 = similar-tax（与 plural 一致）✓
[taxonomies]
  category = "categories"
  tag = "tags"
  use-case = "use-case"
  similar = "similar-tax"

# 分页配置（每页 20 项，平衡总页面数 ≥ 82,460 与 Netlify 85,000 文件上限）
# 注：Hugo v0.128+ 已将 paginate 重命名为 pagerSize，pageSize 不再生效
# 修复 use-case/similar-tax term 页面后，新增 ~6000 页面，需增大 pagerSize 从 12 → 20 以降低分页数
[pagination]
  pagerSize = 20

# 开发环境配置
[params]
description = "查找商业软件的开源替代方案"
env = "production"
devPreview = true
aiDisclosure = true
# Google Search Console 验证（主入口 alternatives.ai-term-hub.com）
# 参数名与 hugo-{lang}.toml 中的 [params] 段落保持一致（snake_case）
google_site_verification = "Po21SS8ccODMgK6x0_LBsBX0t5qz7bdqRzASwE-ngyo"

# JSON 输出格式（用于 Fuse.js 客户端搜索）
[outputFormats.json]
mediaType = "application/json"
baseName = "index"
isPlainText = true
notAlternative = true

# 输出配置
# 注：禁用 section/taxonomy/term 的 RSS，避免生成 10,000+ XML 文件超出 Netlify 85,000 文件上限
# 仅保留 home RSS（用于站点订阅）和 page HTML（详情页）
[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]
page = ["HTML"]

# HTML 压缩配置：保留属性引号，确保 canonical / GSV 等关键 meta 标签
# 能被外部校验脚本（如 125域名全面排查.py）的正则 `rel="canonical"` 匹配到
[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true

# robots.txt 配置（Hugo 内置生成，模板见 layouts/robots.txt）
# 启用后 Hugo 会在 public/robots.txt 输出文件
[services]
[services.googleAnalytics]
id = ""

# Sitemap 配置（Hugo 默认生成 sitemap.xml，此处的优先级/更新频率可调）
[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

# 隐私配置
[privacy]
[privacy.googleAnalytics]
disable = true

# 相关内容索引配置（用于 .Site.RegularPages.Related 查询，生成"相关推荐"）
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10
