name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Verify Netlify credentials
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN is missing. Please configure it in GitHub Secrets (Settings → Secrets and variables → Actions → New repository secret)."
            echo "::error::Generate token at: https://app.netlify.com/user/applications#personal-access-tokens"
            exit 1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID is missing. Please configure it in GitHub Secrets."
            exit 1
          fi
          echo "Netlify credentials verified."
          echo "  NETLIFY_SITE_ID length: ${#NETLIFY_SITE_ID}"
          echo "  NETLIFY_AUTH_TOKEN length: ${#NETLIFY_AUTH_TOKEN}"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Hugo site
        run: hugo --minify --baseURL https://alternatives.ai-term-hub.com/
        env:
          HUGO_ENV: production

      - name: Verify Hugo build output
        run: |
          if [ ! -f "public/index.html" ]; then
            echo "::error::Hugo build failed: public/index.html not found"
            exit 1
          fi
          PAGES_COUNT=$(find public -type f -name "*.html" | wc -l)
          echo "Total HTML pages generated: $PAGES_COUNT"
          if [ "$PAGES_COUNT" -lt 100 ]; then
            echo "::error::Hugo build produced too few pages ($PAGES_COUNT < 100)"
            exit 1
          fi

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './public'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

