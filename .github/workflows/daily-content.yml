name: Daily Content Generation

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = Beijing 08:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate new content
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          OSSAF_AI_PROVIDER: agnes
        run: |
          python3 -m pipeline.run_all

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(content): daily auto-generated content"
          title: "Daily Content Update"
          body: |
            Automated daily content generation.
            - Generated by GitHub Actions
            - Please review before merge
          branch: daily-content
          base: main
